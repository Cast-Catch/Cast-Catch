<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <meta name="theme-color" content="#0a1628"/>
  <title>Fish Identifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000;
      --surface: #0a1628;
      --border: rgba(94,168,195,0.2);
      --accent: #5ea8c3;
      --accent2: #a8d8ea;
      --text: #e8dcc8;
      --muted: #5e7d96;
      --gold: #d4c4a8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 430px;
      margin: 0 auto;
      padding: calc(var(--safe-top) + 24px) 20px calc(var(--safe-bottom) + 24px);
      min-height: 100%;
    }

    /* Header */
    h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* API Key section */
    .key-section {
      background: rgba(94,168,195,0.06);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .key-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .key-row { display: flex; gap: 8px; }
    .key-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: monospace;
      outline: none;
    }
    .key-input:focus { border-color: var(--accent); }
    .key-input::placeholder { color: #3a5a70; }
    .key-save {
      padding: 12px 16px;
      background: linear-gradient(135deg, #1a5a7a, var(--accent));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .key-status {
      font-size: 12px;
      font-style: italic;
      margin-top: 8px;
      min-height: 18px;
    }
    .key-status.ok { color: #4caf7d; }
    .key-status.err { color: #c97a7a; }

    /* Upload area */
    .upload-area {
      border: 2px dashed rgba(94,168,195,0.3);
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      position: relative;
      background: rgba(94,168,195,0.02);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .upload-area:active {
      border-color: var(--accent);
      background: rgba(94,168,195,0.07);
    }
    .upload-area input {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .upload-icon { font-size: 56px; margin-bottom: 12px; line-height: 1; }
    .upload-title { font-size: 16px; color: var(--accent2); margin-bottom: 6px; }
    .upload-hint { font-size: 13px; color: var(--muted); font-style: italic; }

    /* Preview */
    .preview-wrap { margin-bottom: 16px; display: none; }
    .preview-img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
      display: block;
    }
    .preview-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    /* Buttons */
    .btn {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-family: Georgia, serif;
      font-style: italic;
      cursor: pointer;
      min-height: 52px;
      transition: all 0.18s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a5a7a, var(--accent));
      color: #f0f8ff;
    }
    .btn-primary:active { transform: scale(0.98); filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    /* Loading */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 28px;
      color: var(--accent);
      font-style: italic;
      font-size: 15px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* Result */
    .result {
      display: none;
      background: rgba(94,168,195,0.06);
      border: 1px solid rgba(94,168,195,0.25);
      border-radius: 16px;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .result-title {
      font-size: 17px;
      color: var(--accent2);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    .result-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    /* Error */
    .error-box {
      display: none;
      background: rgba(201,122,122,0.08);
      border: 1px solid rgba(201,122,122,0.3);
      border-radius: 14px;
      padding: 16px;
      color: #e09090;
      font-size: 14px;
      font-style: italic;
      line-height: 1.6;
    }

    /* Reset link */
    .reset-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
      margin-top: 16px;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="page">

  <h1>Fish<span>&</span>ID</h1>
  <div class="subtitle">AI Fish Identifier</div>

  <!-- API Key -->
  <div class="key-section">
    <div class="key-label">Anthropic API Key</div>
    <div class="key-row">
      <input class="key-input" id="key-input" type="password" placeholder="sk-ant-api03-..."/>
      <button class="key-save" onclick="saveKey()">Save</button>
    </div>
    <div class="key-status" id="key-status"></div>
  </div>

  <!-- Upload -->
  <div class="upload-area" id="upload-area">
    <input type="file" accept="image/*" id="photo-input" onchange="onPhotoSelected(this)"/>
    <div class="upload-icon">🐟</div>
    <div class="upload-title">Select a photo of your fish</div>
    <div class="upload-hint">Choose from gallery or take a new photo</div>
  </div>

  <!-- Preview + actions -->
  <div class="preview-wrap" id="preview-wrap">
    <img class="preview-img" id="preview-img" alt="Fish photo"/>
    <div class="preview-actions">
      <button class="btn btn-ghost" onclick="resetAll()">↩ Change photo</button>
      <button class="btn btn-primary" id="identify-btn" onclick="identify()">🔍 Identify</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    Analyzing your catch…
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-title">🐠 Identification Result</div>
    <div class="result-text" id="result-text"></div>
    <span class="reset-link" onclick="resetAll()">Identify another fish</span>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box"></div>

</div>
<script>
  // ── API Key ────────────────────────────────────────────────────────────────
  const KEY_STORE = 'fishid_apikey';

  function loadKey() {
    const k = localStorage.getItem(KEY_STORE) || '';
    document.getElementById('key-input').value = k;
    updateKeyStatus(k);
  }

  function saveKey() {
    const k = document.getElementById('key-input').value.trim();
    if (!k) {
      setStatus('Enter your API key above.', 'err');
      return;
    }
    if (!k.startsWith('sk-ant-')) {
      setStatus('⚠️ Key must start with "sk-ant-" — check and try again.', 'err');
      return;
    }
    localStorage.setItem(KEY_STORE, k);
    setStatus('✅ Key saved! You can now identify fish.', 'ok');
  }

  function getKey() { return localStorage.getItem(KEY_STORE) || ''; }

  function updateKeyStatus(k) {
    if (k && k.startsWith('sk-ant-')) setStatus('✅ API key ready.', 'ok');
    else setStatus('Paste your key from console.anthropic.com → API Keys', '');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('key-status');
    el.textContent = msg;
    el.className = 'key-status' + (type ? ' ' + type : '');
  }

  // ── Photo handling ─────────────────────────────────────────────────────────
  let photoB64 = null;
  let photoMime = 'image/jpeg';

  function onPhotoSelected(input) {
    const file = input.files[0];
    if (!file) return;

    photoMime = file.type || 'image/jpeg';

    const reader = new FileReader();
    reader.onload = function(e) {
      photoB64 = e.target.result.split(',')[1];
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('upload-area').style.display = 'none';
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      document.getElementById('error-box').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function resetAll() {
    photoB64 = null;
    document.getElementById('photo-input').value = '';
    document.getElementById('upload-area').style.display = 'block';
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
  }

  // ── Identify ───────────────────────────────────────────────────────────────
  async function identify() {
    const key = getKey();
    if (!key || !key.startsWith('sk-ant-')) {
      document.getElementById('error-box').textContent = '⚠️ Please save your Anthropic API key above first.';
      document.getElementById('error-box').style.display = 'block';
      return;
    }
    if (!photoB64) return;

    const btn = document.getElementById('identify-btn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const errorBox = document.getElementById('error-box');

    btn.disabled = true;
    loading.style.display = 'flex';
    result.style.display = 'none';
    errorBox.style.display = 'none';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: {
                  type: 'base64',
                  media_type: photoMime,
                  data: photoB64
                }
              },
              {
                type: 'text',
                text: 'Identify this fish. Please give:\n1) Common name & scientific name\n2) Key identifying features you can see in this photo\n3) Typical habitat\n4) Best fishing techniques for this species\n5) Any size or catch regulations to be aware of\n\nBe concise and practical.'
              }
            ]
          }]
        })
      });

      if (!response.ok) {
        const body = await response.json().catch(() => ({}));
        if (response.status === 401) throw new Error('Invalid API key. Please check and re-save your key above.');
        if (response.status === 429) throw new Error('Rate limit reached. Wait a moment and try again.');
        throw new Error(body.error?.message || `Error ${response.status} — check your API key and internet connection.`);
      }

      const data = await response.json();
      const text = data.content.map(b => b.text || '').join('');

      document.getElementById('result-text').textContent = text;
      result.style.display = 'block';

    } catch (err) {
      errorBox.textContent = '⚠️ ' + err.message;
      errorBox.style.display = 'block';
    }

    btn.disabled = false;
    loading.style.display = 'none';
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadKey();
</script>
</body>
</html>
